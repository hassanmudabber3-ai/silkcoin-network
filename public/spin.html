<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Silkcoin Lucky Spin</title>

<link rel="stylesheet" href="style.css">


<style>


body{

background:#05091c;

color:white;

font-family:Arial;

overflow-y:auto;

}



.app{

padding-bottom:90px;

}



.topbar{

display:flex;

justify-content:space-between;

align-items:center;

padding:15px;

background:#10183d;

}



button{

border:0;

border-radius:18px;

padding:14px 22px;

background:#d9a441;

color:#111;

font-weight:bold;

cursor:pointer;

}





.card{

margin:20px;

padding:25px;

border-radius:25px;

background:linear-gradient(

145deg,

#182452,

#080d25

);

box-shadow:0 0 25px #000;

text-align:center;

}






#wheelBox{

position:relative;

width:300px;

height:300px;

margin:30px auto;

}



#wheel{


width:300px;

height:300px;

border-radius:50%;

border:8px solid #ffd45c;


background:

conic-gradient(

#ffd45c 0deg 36deg,

#9b59b6 36deg 72deg,

#3498db 72deg 108deg,

#2ecc71 108deg 144deg,

#e67e22 144deg 180deg,

#e74c3c 180deg 216deg,

#1abc9c 216deg 252deg,

#34495e 252deg 288deg,

#f1c40f 288deg 324deg,

#8e44ad 324deg 360deg

);



transition:5s cubic-bezier(.17,.67,.12,.99);

box-shadow:

0 0 40px #d9a441;


}



.label{


position:absolute;

width:100%;

height:100%;

top:0;

left:0;

display:flex;

justify-content:center;

align-items:center;

font-size:22px;

font-weight:bold;


}




.pointer{

font-size:40px;

color:#ffd45c;

}





.bottom-nav{

position:fixed;

bottom:0;

left:0;

right:0;

background:#10183d;

display:flex;

justify-content:space-around;

padding:12px;

}



.bottom-nav button{

background:none;

font-size:25px;

padding:5px;

}


</style>


</head>




<body>



<div class="app">





<div class="topbar">


<button onclick="location.href='index.html'">

🏠

</button>


<h2>

🎡 Lucky Spin

</h2>


<button onclick="location.href='wallet.html'">

💰

</button>


</div>







<div class="card">



<div class="pointer">

▼

</div>



<div id="wheelBox">


<div id="wheel">


<div class="label">

0.5

</div>


</div>


</div>





<h2>

Prize:

<span id="result">

-

</span>

SILK

</h2>





<h3>

Remaining:

<span id="chance">

5

</span>

/5

</h3>





<button onclick="watchAd()">

📺 Watch Advertisement

</button>


<br><br>



<button onclick="spin()">

🎡 Spin Now

</button>




<p id="msg">

</p>



</div>









<div class="bottom-nav">


<button onclick="location.href='index.html'">

🏠

</button>


<button onclick="location.href='mining.html'">

⛏

</button>


<button>

🎡

</button>


<button onclick="location.href='wallet.html'">

💰

</button>


</div>





</div>







<script>



let user =

JSON.parse(

localStorage.getItem("user")

);



if(!user){

location.href="login.html";

}




let unlocked=false;


let rotation=0;






function load(){



fetch(

"/api/wallet/"+user.id

)


.then(r=>r.json())


.then(data=>{



let left=

5-data.spin_count;


document.getElementById("chance")

.innerHTML=left;



});



}





function watchAd(){



document.getElementById("msg")

.innerHTML=

"📺 Watching ad...";



// شبیه سازی تبلیغ


setTimeout(()=>{



unlocked=true;



document.getElementById("msg")

.innerHTML=

"✅ Spin unlocked";



},5000);



}








function spin(){



if(!unlocked){



alert(

"Watch advertisement first"

);


return;


}





unlocked=false;






let reward=

(

Math.floor(

Math.random()*10

)+1

)

*0.5;





let index=

Math.floor(reward/0.5);





rotation +=

1440 +

(360-index*36);



document.getElementById("wheel")

.style.transform=

"rotate("+rotation+"deg)";







setTimeout(()=>{



fetch(

"/api/spin",

{


method:"POST",


headers:{

"Content-Type":

"application/json"

},


body:JSON.stringify({

id:user.id

})

}



)



.then(r=>r.json())


.then(data=>{


if(data.success){



document.getElementById("result")

.innerHTML=

data.reward;



document.getElementById("msg")

.innerHTML=

"🎉 Added to Wallet";



load();


}

else{


document.getElementById("msg")

.innerHTML=data.message;


}



});



},5000);





}




load();



</script>




</body>


</html>
