<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Silkcoin Network</title>

<link rel="stylesheet" href="style.css">

</head>



<body>



<div class="container">



<h1>
🪙 Silkcoin Network
</h1>




<div class="card">



<h2 id="welcome">

Welcome

</h2>



<h3>

Balance:

</h3>


<h1>

<span id="balance">

0

</span>

SILK

</h1>




<button onclick="location.href='mining.html'">

⛏ Mining

</button>



<br><br>



<button onclick="location.href='spin.html'">

🎡 Lucky Spin

</button>



<br><br>



<button onclick="location.href='wallet.html'">

💰 Wallet

</button>



<br><br>



<button onclick="logout()">

🚪 Logout

</button>



</div>




</div>






<script>




let user =

JSON.parse(

localStorage.getItem("user")

);





// اگر وارد نشده

if(!user){


location.href="login.html";


}

else{


document.getElementById("welcome")
.innerHTML =


"Welcome "
+
user.username
+
" 👋";




loadUser();



}






function loadUser(){



fetch(

"/api/user/"
+
user.id

)



.then(res=>res.json())



.then(data=>{



document.getElementById("balance")
.innerHTML =

data.balance;



});



}







function logout(){



localStorage.removeItem("user");


location.href="login.html";



}





</script>





</body>

</html>
