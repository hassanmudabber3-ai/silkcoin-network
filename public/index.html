<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Silkcoin</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="app">


<div id="login">

<h1>💎 SILKCOIN</h1>

<p>Secure Mining Network</p>


<button onclick="login()">

🔐 Connect Telegram

</button>


</div>





<div id="dashboard" class="hide">


<h1>💎 Silkcoin</h1>



<div class="wallet">

<h3>Wallet ID</h3>

<p id="wallet">-</p>


<h2 id="balance">

0 SCN

</h2>


</div>






<div class="card">


<h2>⛏ Mining 24H</h2>


<p id="mineMsg">

Ready

</p>


<button onclick="startMining()">

START MINING

</button>


</div>







<div class="card">


<h2>🎡 Lucky Spin</h2>



<div class="wheel-box">


<div id="wheel">


<div>1</div>

<div>5</div>

<div>10</div>

<div>20</div>

<div>50</div>

<div>100</div>


</div>


</div>



<button onclick="spin()">

🎡 SPIN

</button>


<p id="spinMsg"></p>


</div>








<div class="card">


<h2>💰 Wallet Transfer</h2>


<input id="receiver" placeholder="Receiver ID">


<input id="amount" placeholder="Amount">


<button onclick="sendCoin()">

Send

</button>


<p id="sendMsg"></p>


</div>






</div>


</div>



<script src="app.js"></script>


</body>

</html>
