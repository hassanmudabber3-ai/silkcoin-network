<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Silkcoin</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="app">


<div class="topbar">


<h2 id="appTitle">
🪙 Silkcoin
</h2>


<button onclick="changeLang()">

🌐

</button>


</div>





<div class="coin-box">


<img src="https://cdn-icons-png.flaticon.com/512/600/600923.png">


<h1>

<span id="balance">

0

</span>

SILK

</h1>


<p id="balanceText">

Balance

</p>



</div>








<div class="card">


<button onclick="location.href='mining.html'">

⛏ <span data-en="Mining" data-fa="ماین">

Mining

</span>

</button>




<button onclick="location.href='spin.html'">

🎡 Lucky Spin

</button>





<button onclick="location.href='wallet.html'">

💰 Wallet

</button>



</div>








<div class="card">


<h3>

Network

</h3>


<p>

👥 Users:

<span id="users">

0

</span>

</p>


<p>

⚡ Rate:

<span id="rate">

0

</span>

SILK/H

</p>


</div>









<div class="bottom-nav">


<button onclick="location.href='index.html'">

🏠

</button>



<button onclick="location.href='mining.html'">

⛏

</button>



<button onclick="location.href='spin.html'">

🎡

</button>



<button onclick="location.href='wallet.html'">

💰

</button>


</div>




</div>








<script>



let user = JSON.parse(

localStorage.getItem("user")

);



if(!user){


location.href="login.html";


}







function load(){



fetch("/api/user/"+user.id)

.then(r=>r.json())

.then(data=>{


document.getElementById("balance")
.innerHTML=

Number(data.balance)
.toFixed(4);



});






fetch("/api/users")

.then(r=>r.json())

.then(data=>{


let count=data.total;


document.getElementById("users")
.innerHTML=count;



let rate;


if(count<10000)

rate=2;


else if(count<100000)

rate=1.2;


else if(count<1000000)

rate=.5;


else

rate=.1;




document.getElementById("rate")
.innerHTML=rate;



});



}






function changeLang(){



let items=document.querySelectorAll("[data-en]");



items.forEach(x=>{


if(x.innerHTML.trim()=="Mining"){


x.innerHTML=x.dataset.fa;


}

else{


x.innerHTML=x.dataset.en;


}



});



document.getElementById("balanceText")
.innerHTML=

document.getElementById("balanceText")
.innerHTML=="Balance"

?

"موجودی"

:

"Balance";



}







load();



</script>



</body>

</html>
