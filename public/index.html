<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
Silkcoin Network
</title>


<link rel="stylesheet" href="style.css">


</head>


<body>


<div class="app">



<div class="topbar">


<h2>
🪙 Silkcoin
</h2>


<button onclick="changeLang()">

🌐

</button>



</div>






<div class="coin-box">


<img src="https://cdn-icons-png.flaticon.com/512/600/600923.png">


<h1 id="balance">

0

</h1>


<p>

SILK Balance

</p>



<h3 id="welcome">

Welcome

</h3>



</div>







<div class="card">


<button class="main-btn"

onclick="location.href='mining.html'">

⛏ Start Mining

</button>



<button class="main-btn"

onclick="location.href='spin.html'">

🎡 Lucky Spin

</button>



<button class="main-btn"

onclick="location.href='wallet.html'">

💰 Wallet

</button>



</div>








<div class="card">


<h3>

Network

</h3>


<p>

👥 Users:

<span id="users">

0

</span>

</p>



<p>

⚡ Mining Rate:

<span id="rate">

0

</span>

SILK/H

</p>


</div>









<div class="bottom-nav">



<button onclick="location.href='index.html'">

🏠

</button>



<button onclick="location.href='mining.html'">

⛏

</button>



<button onclick="location.href='spin.html'">

🎡

</button>



<button onclick="location.href='wallet.html'">

💰

</button>



</div>





</div>










<script>



let user =

JSON.parse(

localStorage.getItem("user")

);





if(!user){


location.href="login.html";


}





document.getElementById("welcome")
.innerHTML=

"Hello "
+
user.username;






function load(){



fetch("/api/user/"+user.id)


.then(r=>r.json())


.then(data=>{


document.getElementById("balance")
.innerHTML=

Number(data.balance)
.toFixed(4);



});






fetch("/api/users")


.then(r=>r.json())


.then(data=>{



let rate;



if(data.users < 10000)

rate=2;


else if(data.users <100000)

rate=1.2;


else if(data.users <1000000)

rate=0.5;


else

rate=0.1;




document.getElementById("users")
.innerHTML=data.users;



document.getElementById("rate")
.innerHTML=rate;



});



}







function changeLang(){



let title =

document.querySelector("h2");



if(title.innerHTML.includes("Silkcoin")){


title.innerHTML="سیلک کوین";


}

else{


title.innerHTML="🪙 Silkcoin";


}



}






load();



</script>



</body>

</html>
