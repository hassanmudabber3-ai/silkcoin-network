<!DOCTYPE html>
<html>


<head>


<meta charset="UTF-8">


<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
Silkcoin Register
</title>



<link rel="stylesheet" href="style.css">



</head>



<body>



<div class="app">



<div class="topbar">


<h2>

🪙 Silkcoin

</h2>



<button onclick="changeLang()">

🌐

</button>


</div>






<div class="card">



<h2 id="title">

Create Account

</h2>




<input

id="username"

placeholder="Username"

>




<input

id="password"

type="password"

placeholder="Password"

>




<input

id="recovery"

placeholder="Recovery Code"

>



<p>

Save this code for password recovery

</p>





<button onclick="register()">

🚀 Register

</button>




<p id="message"

class="message">

</p>





<button onclick="location.href='login.html'">

Login

</button>




</div>



</div>








<script>



let lang="en";





function changeLang(){



if(lang==="en"){


lang="fa";


document.getElementById("title")
.innerHTML=

"ساخت حساب";



}

else{


lang="en";


document.getElementById("title")
.innerHTML=

"Create Account";


}



}









function register(){



let username =

document.getElementById("username")
.value;



let password =

document.getElementById("password")
.value;



let recovery =

document.getElementById("recovery")
.value;






fetch("/api/register",{


method:"POST",


headers:{


"Content-Type":"application/json"

},


body:JSON.stringify({


username,

password,

recovery


})


})



.then(r=>r.json())



.then(data=>{



if(data.success){



document.getElementById("message")
.innerHTML=

"Account Created 🎉";



setTimeout(()=>{


location.href="login.html";


},1000);



}

else{


document.getElementById("message")
.innerHTML=

"❌ "
+
data.message;


}



});



}



</script>




</body>

</html>
