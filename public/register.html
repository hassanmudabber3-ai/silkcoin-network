<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Silkcoin Register</title>

<link rel="stylesheet" href="style.css">

</head>



<body>



<div class="container">



<h1>
🪙 Silkcoin Network
</h1>



<div class="card">


<h2>
Create Account
</h2>



<input

id="username"

type="text"

placeholder="Username"

>



<br><br>



<input

id="password"

type="password"

placeholder="Password"

>



<br><br>




<button onclick="register()">

🚀 Register

</button>



<p id="message">

</p>



<br>



<a href="login.html">

Already have account? Login

</a>



</div>



</div>






<script>



function register(){



let username =

document.getElementById("username")
.value;



let password =

document.getElementById("password")
.value;






fetch("/api/register",{


method:"POST",


headers:{


"Content-Type":"application/json"


},



body:JSON.stringify({


username:username,


password:password


})


})



.then(res=>res.json())



.then(data=>{



document.getElementById("message")
.innerHTML =

data.message;





if(data.success){



setTimeout(()=>{


location.href="login.html";


},1000);



}



});



}



</script>



</body>


</html>
