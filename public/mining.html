<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Silkcoin Mining</title>


<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<h1>
⛏ Silkcoin Mining
</h1>



<div class="card">


<h2 id="timer">

24:00:00

</h2>



<h3 id="status">

Ready

</h3>



<h2>

Balance:

<span id="balance">

0

</span>

SILK

</h2>



<button onclick="startMining()">

🚀 Start Mining

</button>



<br><br>



<button onclick="claim()">

🎁 Claim

</button>


</div>





<div class="rate-card">


<h2>

Network Rate

</h2>


<h1 id="rate">

Loading...

</h1>


<h3>

👥 Users:

<span id="users">

0

</span>

</h3>


</div>




</div>







<script>


let user =

JSON.parse(

localStorage.getItem("user")

);



if(!user){

location.href="login.html";

}





function startMining(){



fetch("/api/startMining",{


method:"POST",


headers:{

"Content-Type":"application/json"

},


body:JSON.stringify({

id:user.id

})


})



.then(r=>r.json())

.then(data=>{


timer(data.end);


});



}






function timer(end){



let t=setInterval(()=>{


let s=

Math.floor(

(end-Date.now())/1000

);



if(s<=0){


clearInterval(t);


document.getElementById("timer")
.innerHTML="Finished";


return;

}




let h=Math.floor(s/3600);

let m=Math.floor((s%3600)/60);

let sec=s%60;



document.getElementById("timer")
.innerHTML=

h+":"+m+":"+sec;



},1000);



}






function claim(){



fetch("/api/claim",{


method:"POST",


headers:{

"Content-Type":"application/json"

},


body:JSON.stringify({

id:user.id

})


})

.then(r=>r.json())

.then(data=>{


alert(

data.success ?

"Reward Added "+data.reward+" SILK"

:

data.message

);



load();


});


}






function load(){



fetch("/api/user/"+user.id)

.then(r=>r.json())

.then(data=>{


document.getElementById("balance")
.innerHTML=data.balance;



});




fetch("/api/users")

.then(r=>r.json())

.then(data=>{


document.getElementById("users")
.innerHTML=data.users;



let rate;



if(data.users<10000){

rate=2;

}

else if(data.users<100000){

rate=1.2;

}

else if(data.users<1000000){

rate=0.5;

}

else{

rate=0.1;

}



document.getElementById("rate")
.innerHTML=

rate+" SILK / Hour";



});



}


load();



</script>


</body>

</html>
