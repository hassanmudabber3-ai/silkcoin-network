<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
Silkcoin Mining
</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="app">


<div class="topbar">


<button onclick="history.back()">
⬅
</button>


<h2>
⛏ Mining
</h2>


<button onclick="location.href='index.html'">
🏠
</button>


</div>





<div class="coin-box">


<img src="https://cdn-icons-png.flaticon.com/512/600/600923.png">


<h1>

<span id="balance">

0

</span>

SILK

</h1>


<p>
Total Balance
</p>


</div>







<div class="mine-card">



<div class="analog">


<div class="analog-inner">


<h2 id="timer">

24:00:00

</h2>


<p>

Mining

</p>


</div>


</div>





<h2>

Mined:

<span id="mined">

0

</span>

SILK

</h2>



<p id="status">

Ready to mine

</p>




<button class="main-btn"

onclick="startMining()">

🚀 Start Mining

</button>



</div>







<div class="rate">


<h3>
Network Rate
</h3>


<h2 id="rate">

Loading...

</h2>


<p>

👥

<span id="users">

0

</span>

Users

</p>



</div>







<div class="bottom-nav">


<button onclick="location.href='index.html'">

🏠

</button>



<button>

⛏

</button>



<button onclick="location.href='spin.html'">

🎡

</button>



<button onclick="location.href='wallet.html'">

💰

</button>


</div>




</div>








<script>


let user =

JSON.parse(

localStorage.getItem("user")

);



let timerID;



let startTime;



let miningRate=0;





function load(){



fetch("/api/user/"+user.id)


.then(r=>r.json())


.then(data=>{


document.getElementById("balance")
.innerHTML=

Number(data.balance)
.toFixed(4);



if(data.mining_end > Date.now()){


runTimer(
data.mining_end,
data.mining_start
);


}


});






fetch("/api/users")


.then(r=>r.json())


.then(data=>{


let rate;



if(data.users < 10000)

rate=2;


else if(data.users < 100000)

rate=1.2;


else if(data.users < 1000000)

rate=0.5;


else

rate=0.1;



miningRate=rate;



document.getElementById("rate")
.innerHTML=

rate+" SILK / H";


document.getElementById("users")
.innerHTML=data.users;



});



}







function startMining(){



fetch("/api/startMining",{


method:"POST",


headers:{


"Content-Type":"application/json"

},


body:JSON.stringify({

id:user.id

})


})


.then(r=>r.json())


.then(data=>{


runTimer(

data.end,

Date.now()

);


});


}








function runTimer(end,start){


clearInterval(timerID);



startTime=start;



timerID=setInterval(()=>{



let remain=

Math.floor(

(end-Date.now())/1000

);



if(remain<=0){


clearInterval(timerID);



document.getElementById("status")
.innerHTML=

"Mining Finished";


return;


}





let h=

Math.floor(remain/3600);



let m=

Math.floor(

(remain%3600)/60

);



let s=

remain%60;



document.getElementById("timer")
.innerHTML=

h+":"+m+":"+s;







let passed=

(Date.now()-startTime)
/3600000;



let mined=

passed * miningRate;



document.getElementById("mined")
.innerHTML=

mined.toFixed(5);



},1000);



}




load();



</script>



</body>

</html>
