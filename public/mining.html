<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Silkcoin Mining</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<h1>
⛏ Silkcoin Mining
</h1>



<div class="card">


<h2>
Mining Session
</h2>


<h1 id="timer">
24:00:00
</h1>



<h3 id="status">
Ready
</h3>




<h2>
Balance:
<span id="balance">
0
</span>
SILK
</h2>



<button onclick="startMining()">

🚀 Start Mining

</button>



</div>





<div class="rate-card">


<img src="https://cdn-icons-png.flaticon.com/512/2919/2919592.png"
width="80">



<h2>
Network Mining Rate
</h2>



<h1 id="rate">

</h1>



<p>

Based on active users

</p>



<h3>

👥 Users:
<span id="users">

</span>

</h3>


</div>




<br>


<button onclick="location.href='index.html'">

🏠 Home

</button>



</div>





<script>



/*

Network Users
بعداً از دیتابیس گرفته می‌شود

*/


let totalUsers = 10000;





// تعیین نرخ استخراج

function getMiningRate(users){



if(users < 10000){


return 2;


}



else if(users < 100000){


return 1.2;


}



else if(users < 1000000){


return 0.5;


}



else if(users < 5000000){


return 0.1;


}



else{


return 0.05;


}


}





let miningRate =
getMiningRate(totalUsers);





document.getElementById("rate")
.innerHTML =

"⚡ "
+
miningRate
+
" SILK / Hour";



document.getElementById("users")
.innerHTML =
totalUsers;





const miningTime =
24 * 60 * 60;



let timer;





function startMining(){



let end =
localStorage.getItem("mineEnd");



if(!end){



end =
Date.now()
+
(miningTime * 1000);



localStorage.setItem(
"mineEnd",
end
);



localStorage.setItem(
"mineStart",
Date.now()
);



}



document.getElementById("status")
.innerHTML =
"⛏ Mining Active";



startTimer();



}






function startTimer(){



clearInterval(timer);



timer =
setInterval(function(){



let end =
localStorage.getItem("mineEnd");



let remain =
Math.floor(
(end - Date.now()) /1000
);





if(remain <=0){



clearInterval(timer);



document.getElementById("timer")
.innerHTML =
"00:00:00";



document.getElementById("status")
.innerHTML =
"Mining Completed 🎉";



return;

}





let h =
Math.floor(remain/3600);



let m =
Math.floor(
(remain%3600)/60
);



let s =
remain%60;



document.getElementById("timer")
.innerHTML =

String(h).padStart(2,"0")
+
":"
+
String(m).padStart(2,"0")
+
":"
+
String(s).padStart(2,"0");






// محاسبه درآمد لحظه‌ای



let start =
localStorage.getItem("mineStart");



let passed =
(Date.now()-start)
/
3600000;



let earned =
passed * miningRate;





let balance =
Number(
localStorage.getItem("balance")
||
0
);



balance =
balance + earned;



localStorage.setItem(

"balance",

balance.toFixed(6)

);



document.getElementById("balance")
.innerHTML =

balance.toFixed(6);





},1000);



}





window.onload=function(){



let balance =
localStorage.getItem("balance")
||
0;



document.getElementById("balance")
.innerHTML =
balance;





let end =
localStorage.getItem("mineEnd");



if(end && end > Date.now()){


startTimer();


}



}





</script>


</body>

</html>
