<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
Silkcoin Mining
</title>


<link rel="stylesheet" href="style.css">


</head>



<body>


<div class="app">



<div class="topbar">


<button onclick="location.href='index.html'">
🏠
</button>


<h2>
⛏ Mining
</h2>


<button onclick="location.href='wallet.html'">
💰
</button>


</div>





<div class="mine-card">



<div class="analog">


<div class="analog-inner">


<h2 id="timer">
24:00:00
</h2>


<p>
Mining
</p>


</div>


</div>






<h2>

🪙

<span id="mined">
0

</span>

SILK

</h2>




<p id="status">

Ready

</p>





<button onclick="startMining()" id="startBtn">

🚀 Start Mining

</button>



</div>








<div class="card">


<h3>

Network Rate

</h3>


<h2 id="rate">

0 SILK/H

</h2>



</div>







<div class="bottom-nav">


<button onclick="location.href='index.html'">
🏠
</button>


<button>
⛏
</button>


<button onclick="location.href='spin.html'">
🎡
</button>


<button onclick="location.href='wallet.html'">
💰
</button>


</div>





</div>








<script>



let user = JSON.parse(

localStorage.getItem("user")

);



if(!user){

location.href="login.html";

}



let timer;



let rate=0;








function loadMining(){



fetch("/api/user/"+user.id)

.then(r=>r.json())

.then(data=>{



if(data.mining_end > Date.now()){


document.getElementById("status")
.innerHTML="Mining Active";


document.getElementById("startBtn")
.disabled=true;


runTimer(

data.mining_end,

data.mining_start

);



}

else{


document.getElementById("status")
.innerHTML="Ready";


}


});



}









function startMining(){



fetch("/api/user/"+user.id)

.then(r=>r.json())

.then(data=>{



// اگر فعال است دوباره شروع نکن


if(data.mining_end > Date.now()){


alert("Mining already active");


return;


}






fetch("/api/startMining",{


method:"POST",


headers:{


"Content-Type":"application/json"

},


body:JSON.stringify({

id:user.id

})


})

.then(r=>r.json())

.then(data=>{


document.getElementById("startBtn")
.disabled=true;


document.getElementById("status")
.innerHTML="Mining Active";


runTimer(

data.end,

Date.now()

);



});




});



}









function runTimer(end,start){



clearInterval(timer);



timer=setInterval(()=>{



let seconds=

Math.floor(

(end-Date.now())/1000

);




if(seconds<=0){


clearInterval(timer);


document.getElementById("status")
.innerHTML="Finished";


return;

}




let h=

Math.floor(seconds/3600);



let m=

Math.floor(

(seconds%3600)/60

);



let s=

seconds%60;




document.getElementById("timer")
.innerHTML=

h+":"+m+":"+s;






let hours=

(Date.now()-start)

/3600000;



let mined=

hours*rate;



document.getElementById("mined")
.innerHTML=

mined.toFixed(5);



},1000);



}






function loadRate(){



fetch("/api/users")


.then(r=>r.json())


.then(data=>{



let users=data.total;



if(users<10000)

rate=2;


else if(users<100000)

rate=1.2;


else if(users<1000000)

rate=.5;


else

rate=.1;




document.getElementById("rate")
.innerHTML=

rate+" SILK/H";



});



}




loadRate();

loadMining();



</script>



</body>

</html>
