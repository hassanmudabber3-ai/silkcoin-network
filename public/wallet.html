<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
Silkcoin Wallet
</title>

<link rel="stylesheet" href="style.css">

</head>



<body>


<div class="app">



<div class="topbar">


<button onclick="location.href='index.html'">

🏠

</button>


<h2>

💰 Wallet

</h2>



<button onclick="location.href='spin.html'">

🎡

</button>



</div>









<div class="coin-box">


<img src="https://cdn-icons-png.flaticon.com/512/600/600923.png">


<h1>

<span id="balance">

0

</span>

SILK

</h1>


<p>

Total Balance

</p>


</div>










<div class="card">


<h3>

📥 Receive

</h3>


<input id="address" readonly>


<button onclick="copyAddress()">

Copy Address

</button>


</div>









<div class="card">


<h3>

📤 Send SILK

</h3>


<input id="to"

placeholder="Receiver ID">


<input id="amount"

placeholder="Amount">



<button onclick="sendCoin()">

Send

</button>



<p id="sendMsg">

</p>


</div>









<div class="card">


<h3>

📜 Transaction History

</h3>


<div id="history">

Loading...

</div>


</div>









<div class="bottom-nav">


<button onclick="location.href='index.html'">

🏠

</button>


<button onclick="location.href='mining.html'">

⛏

</button>


<button onclick="location.href='spin.html'">

🎡

</button>


<button>

💰

</button>


</div>





</div>









<script>



let user=

JSON.parse(

localStorage.getItem("user")

);



if(!user){

location.href="login.html";

}






function loadWallet(){



fetch("/api/user/"+user.id)


.then(r=>r.json())


.then(data=>{


document.getElementById("balance")
.innerHTML=

Number(data.balance)
.toFixed(4);


});







fetch("/api/history/"+user.id)


.then(r=>r.json())


.then(data=>{


let html="";



if(data.length==0){


html="No transactions";


}



data.forEach(tx=>{



let icon=

tx.type=="LUCKY_SPIN"

?

"🎡"

:

"⛏";




html+=`

<div class="card">

${icon}

<b>${tx.type}</b>

<br>

+ ${tx.amount} SILK

<br>

<small>

${new Date(tx.created).toLocaleString()}

</small>


</div>

`;



});



document.getElementById("history")
.innerHTML=html;



});






document.getElementById("address")
.value=

"SILK-"+user.id+"-"+

Math.random()
.toString(36)
.substring(2,10);



}








function copyAddress(){



navigator.clipboard.writeText(

document.getElementById("address").value

);


alert("Copied");



}









function sendCoin(){



let to=

document.getElementById("to").value;



let amount=

document.getElementById("amount").value;





fetch("/api/send",{


method:"POST",


headers:{


"Content-Type":"application/json"

},


body:JSON.stringify({

from:user.id,

to:to,

amount:Number(amount)

})


})


.then(r=>r.json())


.then(data=>{


document.getElementById("sendMsg")
.innerHTML=

data.message;



loadWallet();



});



}








loadWallet();



</script>



</body>

</html>
