<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Silkcoin Wallet</title>

<link rel="stylesheet" href="style.css">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

</head>


<body>


<div class="container">


<div class="card">



<button onclick="backHome()">

⬅ Back

</button>



<h1>

💰 Silkcoin Wallet

</h1>




<h3>

Telegram ID

</h3>



<p id="telegramId">

Loading...

</p>




<div class="balance">


<span id="balance">

0

</span>


<br>


SILK 🪙


</div>





<h2>

📜 Transaction History

</h2>




<div id="history">


Loading...

</div>




</div>


</div>







<div class="bottom">


<button onclick="go('index.html')">

🏠

<br>

Home

</button>



<button onclick="go('mining.html')">

⛏

<br>

Mining

</button>



<button onclick="go('spin.html')">

🎡

<br>

Spin

</button>



<button onclick="go('wallet.html')">

💰

<br>

Wallet

</button>



<button onclick="go('profile.html')">

👤

<br>

Profile

</button>


</div>







<script>


let user = JSON.parse(

localStorage.getItem(

"silkcoin_user"

)

);



if(user){



fetch(

"/wallet/" + user.id

)


.then(res=>res.json())


.then(data=>{



document.getElementById(

"telegramId"

).innerHTML =

data.id;





document.getElementById(

"balance"

).innerHTML =

data.balance;





let box =

document.getElementById(

"history"

);





box.innerHTML="";




if(data.history.length==0){


box.innerHTML =

"No transactions yet";


}

else{



data.history.reverse().forEach(item=>{


box.innerHTML +=


`

<div>


<b>${item.type}</b>

<br>

+${item.amount} SILK 🪙

<br>

${item.time}


</div>

<hr>


`;



});



}



});


}







function backHome(){

window.location.href=

"index.html";

}




function go(page){

window.location.href=

page;

}



</script>



</body>


</html>
