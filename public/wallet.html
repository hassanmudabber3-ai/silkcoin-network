<!DOCTYPE html>
<html>


<head>


<meta charset="UTF-8">


<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
Silkcoin Wallet
</title>


<link rel="stylesheet" href="style.css">


</head>



<body>


<div class="app">



<div class="topbar">


<button onclick="location.href='index.html'">

🏠

</button>



<h2>

💰 Wallet

</h2>



<button onclick="location.href='spin.html'">

🎡

</button>


</div>







<div class="coin-box">


<img src="https://cdn-icons-png.flaticon.com/512/600/600923.png">


<h1>

<span id="balance">

0

</span>

SILK

</h1>


<p>

Total Balance

</p>



</div>









<div class="card">


<h3>

📜 Transaction History

</h3>



<div id="history">

Loading...

</div>



</div>









<div class="card">


<h3>

Wallet Address

</h3>



<input id="address" readonly>



<button onclick="copyAddress()">

📋 Copy

</button>



</div>







<div class="bottom-nav">


<button onclick="location.href='index.html'">

🏠

</button>



<button onclick="location.href='mining.html'">

⛏

</button>



<button onclick="location.href='spin.html'">

🎡

</button>



<button>

💰

</button>



</div>





</div>









<script>



let user =

JSON.parse(

localStorage.getItem("user")

);



if(!user){

location.href="login.html";

}






function loadWallet(){



// موجودی


fetch("/api/user/"+user.id)


.then(r=>r.json())

.then(data=>{


document.getElementById("balance")
.innerHTML=

Number(data.balance)
.toFixed(4);



});









// تاریخچه


fetch("/api/history/"+user.id)


.then(r=>r.json())

.then(data=>{


let html="";




if(data.length===0){


html="No transactions yet";


}

else{



data.forEach(tx=>{



let date=

new Date(tx.created)
.toLocaleString();





let icon="";



if(tx.type==="LUCKY_SPIN"){

icon="🎡";

}

else if(tx.type==="MINING"){

icon="⛏";

}

else{

icon="🪙";

}






html += `

<div class="card">

${icon}

<b>${tx.type}</b>

<br>

+

${tx.amount}

SILK

<br>

<small>

${date}

</small>

</div>

`;



});



}



document.getElementById("history")
.innerHTML=html;



});





// آدرس نمونه


document.getElementById("address")
.value=

"SILK-"+user.id+"-"+

Math.random()
.toString(36)
.substring(2,10);



}







function copyAddress(){



let input=

document.getElementById("address");



input.select();



navigator.clipboard.writeText(

input.value

);



alert(

"Copied"

);



}





loadWallet();



</script>



</body>

</html>
