<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
Silkcoin Login
</title>


<link rel="stylesheet" href="style.css">


</head>



<body>


<div class="app">



<div class="topbar">


<h2>
🪙 Silkcoin
</h2>



<button onclick="changeLang()">

🌐

</button>


</div>





<div class="card">



<h2 id="title">

Login

</h2>




<input id="username"

placeholder="Username">





<input id="password"

type="password"

placeholder="Password">





<button onclick="login()">

🔐 Login

</button>




<p id="message"

class="message">

</p>





<button onclick="location.href='recover.html'">

🔑 Forgot Password

</button>




<br><br>



<button onclick="location.href='register.html'">

Create Account

</button>



</div>




</div>







<script>




let lang="en";





function changeLang(){



if(lang==="en"){


lang="fa";


document.getElementById("title")
.innerHTML="ورود";


}

else{


lang="en";


document.getElementById("title")
.innerHTML="Login";


}



}








function login(){



let username=

document.getElementById("username")
.value;



let password=

document.getElementById("password")
.value;





fetch("/api/login",{


method:"POST",


headers:{


"Content-Type":"application/json"

},


body:JSON.stringify({

username,

password

})


})



.then(r=>r.json())


.then(data=>{



if(data.success){



localStorage.setItem(

"user",

JSON.stringify(data.user)

);



document.getElementById("message")
.innerHTML=

"Login Successful 🎉";



setTimeout(()=>{


location.href="index.html";


},800);



}


else{


document.getElementById("message")
.innerHTML=

"❌ "
+
data.message;



}



});





}



</script>



</body>

</html>
