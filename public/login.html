<!DOCTYPE html>
<html>


<head>


<meta charset="UTF-8">


<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
Silkcoin Login
</title>


<link rel="stylesheet" href="style.css">


</head>



<body>



<div class="app">





<div class="topbar">


<h2 id="title">

🪙 Silkcoin Login

</h2>



<button onclick="changeLang()">

🌐

</button>


</div>









<div class="card">



<h2 id="loginText">

Login

</h2>






<input

id="username"

placeholder="Username"

>






<input

id="password"

type="password"

placeholder="Password"

>







<button onclick="login()">

🔐

<span id="loginBtn">

Login

</span>

</button>






<p id="message"

class="message">

</p>







<button onclick="location.href='register.html'">

➕ Register

</button>





<button onclick="location.href='recover.html'">

🔑 Recovery

</button>





</div>







</div>








<script>



let fa=false;





function changeLang(){


fa=!fa;


if(fa){


document.getElementById("title")
.innerHTML="🪙 ورود سیلک کوین";


document.getElementById("loginText")
.innerHTML="ورود";


document.getElementById("loginBtn")
.innerHTML="ورود";



document.getElementById("username")
.placeholder="نام کاربری";


document.getElementById("password")
.placeholder="رمز عبور";



}

else{


document.getElementById("title")
.innerHTML="🪙 Silkcoin Login";


document.getElementById("loginText")
.innerHTML="Login";


document.getElementById("loginBtn")
.innerHTML="Login";



document.getElementById("username")
.placeholder="Username";


document.getElementById("password")
.placeholder="Password";



}


}








function login(){



let username=

document.getElementById("username")
.value;



let password=

document.getElementById("password")
.value;





fetch("/api/login",{


method:"POST",


headers:{


"Content-Type":"application/json"

},


body:JSON.stringify({


username,

password


})


})



.then(r=>r.json())


.then(data=>{



if(data.success){



localStorage.setItem(

"user",

JSON.stringify(data.user)

);



document.getElementById("message")
.innerHTML=

"✅ Login Successful";




setTimeout(()=>{


location.href="index.html";


},800);



}


else{


document.getElementById("message")
.innerHTML=

"❌ "+data.message;



}



});





}



</script>





</body>


</html>
