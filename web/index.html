<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Silkcoin</title>

<link rel="stylesheet" href="style.css">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

</head>


<body>


<div class="app">



<div id="login">


<h1>💎 SILKCOIN</h1>

<p>
Secure Mining Network
</p>


<button onclick="login()">

🔐 Connect Telegram

</button>


<p id="error"></p>


</div>







<div id="dashboard" class="hide">


<h1>
💎 Silkcoin
</h1>




<div class="wallet">


<h3>
Wallet
</h3>


<p id="wallet">
-
</p>


<h2 id="balance">
0 SCN
</h2>


</div>







<div class="card">


<h2>
⛏ Mining 24H
</h2>


<p id="mineMsg">

Ready

</p>



<button onclick="startMining()">

START MINING

</button>



</div>









<div class="card">


<h2>
🎡 Lucky Spin
</h2>




<div class="wheel-box">


<div id="wheel">


<div class="segment">
1 SCN
</div>


<div class="segment">
5 SCN
</div>


<div class="segment">
10 SCN
</div>


<div class="segment">
20 SCN
</div>


<div class="segment">
50 SCN
</div>


<div class="segment">
100 SCN
</div>


</div>




<div class="pointer">

▼

</div>



</div>







<button onclick="spin()">

🎡 SPIN

</button>


<p id="spinMsg">

</p>




</div>








<div class="menu">


<button>
🏠 Home
</button>


<button>
💰 Wallet
</button>


<button>
👥 Friends
</button>


</div>





</div>


</div>





<script src="app.js"></script>


</body>


</html>
