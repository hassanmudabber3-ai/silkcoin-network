<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Silkcoin</title>

<link rel="stylesheet" href="style.css">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

</head>


<body>


<div class="app">


<h1>🚀 Silkcoin</h1>


<div class="menu">


<button onclick="show('wallet')">
💰 Wallet
</button>


<button onclick="show('mine')">
⛏ Mining
</button>


<button onclick="show('spin')">
🎡 Spin
</button>


<button onclick="show('friends')">
👥 Friends
</button>


</div>





<div id="wallet" class="page">

<h2>Wallet</h2>

<p id="address">
Loading...
</p>


<h1 id="balance">
0 SCN
</h1>

</div>







<div id="mine" class="page hidden">


<h2>Mining</h2>


<p>
Mine Silkcoin every day
</p>


<button onclick="startMining()">

⛏ Start Mining

</button>


<h3 id="mineMsg"></h3>


</div>







<div id="spin" class="page hidden">


<h2>Lucky Wheel 🎡</h2>


<button onclick="spin()">

Spin

</button>


<h3 id="spinMsg"></h3>


</div>








<div id="friends" class="page hidden">


<h2>Friends</h2>

<p>
Invite friends and earn SCN
</p>


</div>





</div>



<script src="app.js"></script>


</body>

</html>
